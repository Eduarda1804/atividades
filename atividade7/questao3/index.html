<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../questao3/estilo/layout.css">
    <title>Formulário</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Informações pessoais</legend>
            <fieldset class="endereço">
                <legend>Informações de endereço</legend>
                <label for="lbCidade">Cidade</label>
                <input id="ipCidade" name="cidade" type="text"><br>
                <label for="lbCep">Cep:</label>
                <input id="ipCep" name="cep" type="text">
            </fieldset>
            <fieldset class="telefone">
                <legend>Informações de contato</legend>
                <label for="lbCasa">Casa:</label>
                <input id="ipCasa" name="casa" type="text"><br>
                <label for="lbCelular">Celular:</label>
                <input id="ipCelular" name="celular" type="text">
            </fieldset>
        </fieldset>
    </form>
</body>
</html>
