<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../questao2/estilo/layout.css">
    <title>Formulário de Cadastro</title>
</head>

<body>
    <form action="">
        <table>
            <tr>
                <td colspan="3" class="azul_claro">Não é associado? Faça seu cadastro</td>
                <td class="azul_escuro"></td>
            </tr>

            <tr>
                <td>Nome</td>
                <td colspan="3"><input type="text" name="nome"></td>
            </tr>
            <tr>
                <td>Nome <br>Completo</td>
                <td colspan="3"><input type="text" name="nome_completo"></td>
            </tr>
            <tr>
                <td>CPF</td>
                <td colspan="3"><input type="text" name="cpf"></td>
            </tr>
            <tr>
                <td>E-mail</td>
                <td colspan="3"><input type="text" name="email"></td>
            </tr>
            <tr>
                <td>WebSite</td>
                <td colspan="3"><input type="text" name="website"></td>
            </tr>
            <tr>
                <td>Endereço</td>
                <td colspan="3"><input type="text" name="endereco"></td>
            </tr>

            <tr>
                <td>Bairro</td>
                <td><input type="text" name="bairro"></td>
                <td>Cidade</td>
                <td><input type="text" name="cidade"></td>
            </tr>
            <tr>
                <td>Cep</td>
                <td><input type="text" name="cep"></td>
                <td>UF</td>
                <td>
                    <select name="uf">
                        <option value="BA">BA</option>
                        <option value="AC">AC</option>
                        <option value="AL">AL</option>
                        <option value="AP">AP</option>
                        <option value="AM">AM</option>
                        <option value="CE">CE</option>
                        <option value="DF">DF</option>
                        <option value="ES">ES</option>
                        <option value="GO">GO</option>
                        <option value="MA">MA</option>
                        <option value="MT">MT</option>
                        <option value="MS">MS</option>
                        <option value="MG">MG</option>
                        <option value="PA">PA</option>
                        <option value="PB">PB</option>
                        <option value="PR">PR</option>
                        <option value="PE">PE</option>
                        <option value="PI">PI</option>
                        <option value="RJ">RJ</option>
                        <option value="RN">RN</option>
                        <option value="RS">RS</option>
                        <option value="RO">RO</option>
                        <option value="RR">RR</option>
                        <option value="SC">SC</option>
                        <option value="SP">SP</option>
                        <option value="SE">SE</option>
                        <option value="TO">TO</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Telefone</td>
                <td><input type="text" name="tel"></td>
                <td>Fax</td>
                <td><input type="text" name="fax"></td>
            </tr>
            <tr>
                <td>Data <br>Nascimento</td>
                <td><input type="text" name="data"></td>
                <td>Sexo</td>
                <td>
                    <input type="radio" name="Sexo" value="M"><label for="m">M</label>
                    <input type="radio" name="Sexo" value="F"><label for="f">F</label>
                </td>
            </tr>
            <tr>
                <td>Celular</td>
                <td><input type="text" name="cel"></td>
                <td>Est.Civil</td>
                <td>
                    <select name="est_civil">
                        <option>Solteiro</option>
                        <option>Casado</option>
                        <option>Viúvo</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Login</td>
                <td><input type="text" name="login"></td>
                <td>Senha</td>
                <td><input type="password" name="senha"></td>
            </tr>

            <tr>
                <td colspan="4">
                    <p>Deseja receber informações sobre os seguintes assuntos abaixo:</p>

                    <input type="checkbox"><label for="tecnologia">Tecnologia</label>
                    <input type="checkbox"><label for="esportes">Esportes</label>
                    <input type="checkbox"><label for="automoveis">Automóveis</label>
                    <input type="checkbox"><label for="culinaria">Culinária</label>
                    <input type="checkbox"><label for="politica">Política</label>
                    <input type="checkbox"><label for="policial">Policial</label>
                    <input type="checkbox"><label for="tempo">Tempo</label>
                    <br><br>
                    <input type="checkbox"><label for="cultura">Cultura</label>
                    <input type="checkbox"><label for="economia">Economia</label>
                    <input type="checkbox"><label for="jogos">Jogos</label>
                    <input type="checkbox"><label for="educacao">Educação</label>
                    <input type="checkbox"><label for="viagem">Viagem</label>
                    <input type="checkbox"><label for="emprego">Empregos</label>
                    <input type="checkbox"><label for="moda">Moda e Estilo</label>
                </td>
            </tr>

            <tr>
                <td colspan="4">
                    <br>
                    <input type="checkbox">
                    <label for="termos">Li as regras de cadastro e autorizo a criação do usuário</label>
                    <br><br>
                    <button type="submit">Confirmar</button>
                    <button type="reset">Retornar</button>
                </td>
            </tr>
        </table>
    </form>

</body>

</html>
