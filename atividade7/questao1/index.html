<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../questao1/estilo/layout.css">
    <title>Formulário</title>
</head>
<body>
    <main>
    <h1>Deixe um comentário</h1>
    <form id="formulario" action="paginas/formulario.html" method="post">
        <fieldset>
            <label for="lbNome">Nome:</label>
            <input id="ipNome" name="Nome" type="text" required>

            <label for="lbEmail">Email:</label>
            <input id="ipEmail" name="iEmail" type="Email" required>

            <label for="lbWebsite">Website:</label>
            <input id="ipWebsitw" name="Website" type="text" required>

            <label for="lbComentario">Comentário:</label>
            <textarea id="taComentario" name="Comentario" rows="20"></textarea>
            <p>Observação: seu comentário será publicado após passar pelo moderador</p>
            <input type="submit" value="Enviar">
        </fieldset>
    </form>
    </main>
</body>
</html>
