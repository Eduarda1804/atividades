<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../questao1/estilo/layout.css">
    <style>
    </style>
    <title>Formulário</title>
</head>
<body>
    <h1>Deixe um comentário</h1>
    <form action="">
        <label for="texto">Nome:</label>
        <input type="text" name="texto">
        <label for="campo_email">E-mail:</label>
        <input type="email" name="campo_email">
        <label for="website">Website:</label>
        <input type="url" name="website">
        <label for="area_de_texto">Comentário:</label>
        <textarea rows="20" name="area_de_texto"></textarea>
        <p>Observação: seu comentário será publicado após passar pelo moderador</p>
        <button type="submit">Enviar Comentário</button>

    </form>
</body>
</html>
